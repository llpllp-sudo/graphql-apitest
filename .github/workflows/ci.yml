name: GraphQL API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install JBang
      run: |
        curl -Ls https://sh.jbang.dev | bash -s - app setup
        echo "$HOME/.jbang/bin" >> $GITHUB_PATH

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache JBang / Karate
      uses: actions/cache@v4
      with:
        path: |
          ~/.jbang
          ~/.karate
        key: ${{ runner.os }}-jbang-${{ hashFiles('package.json') }}
        restore-keys: |
          ${{ runner.os }}-jbang-

    - name: Run Jest Tests
      run: npm test

    - name: Run Karate Tests
      run: npm run test:karate

    - name: Upload Karate Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: karate-reports
        path: target/karate-reports/
        retention-days: 7
